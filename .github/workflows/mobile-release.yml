name: mobile-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver (e.g. v1.2.3)"
        required: true

jobs:
  cut:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Create tag and branch
        run: |
          git tag "${{ github.event.inputs.version }}"
          git push origin "${{ github.event.inputs.version }}"
          git switch -c "release/${{ github.event.inputs.version }}"
          git push -u origin "release/${{ github.event.inputs.version }}"